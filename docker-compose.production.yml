services:
  app-production:
    image: ${DOCKER_IMAGE:-bapenda-jambi}:latest
    container_name: app-production
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.production
    networks:
      - production-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  production-network:
    name: production-network
    driver: bridge
