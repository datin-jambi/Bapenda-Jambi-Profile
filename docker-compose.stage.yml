services:
  app-staging:
    build:
      context: .
      dockerfile: Dockerfile.stage
    image: bapenda-profile:staging
    container_name: bapenda-profile-staging
    restart: unless-stopped
    ports:
      - "3032:3032"
    env_file:
      - .env.staging
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - staging-network
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:3032/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  staging-network:
    name: staging-network
    driver: bridge
