services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DATABASE_URL: ${DATABASE_URL}
        NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-build-time-placeholder-not-for-production}
        IMAGEKIT_URL_ENDPOINT: ${IMAGEKIT_URL_ENDPOINT}
        IMAGEKIT_PUBLIC_KEY: ${IMAGEKIT_PUBLIC_KEY}
        NEXT_PUBLIC_IMAGEKIT_URL_ENDPOINT: ${NEXT_PUBLIC_IMAGEKIT_URL_ENDPOINT}
        NEXT_PUBLIC_IMAGEKIT_PUBLIC_KEY: ${NEXT_PUBLIC_IMAGEKIT_PUBLIC_KEY}
        NEXT_PUBLIC_PKB_API_HOST: ${NEXT_PUBLIC_PKB_API_HOST}
        NEXT_PUBLIC_PKB_API_TOKEN: ${NEXT_PUBLIC_PKB_API_TOKEN}
    image: bapenda-profile
    container_name: bapenda-profile
    restart: always
    ports:
      - "0.0.0.0:3031:3031"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - app-network
    cpus: "0.5"
    mem_limit: "512m"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "512M"
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3031/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  app-network:
